<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        AI Translator Pro
    </title>

    <link rel="stylesheet"
        href="{{ url_for('static',
        filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/feather-icons"></script>

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <div>

                <div class="logo">

                    <div class="logo-icon">
                        🌍
                    </div>

                    <div class="logo-text">
                        AI Translator
                        <span>
                            Pro
                        </span>
                    </div>

                </div>

                <div class="menu">

                    <button class="active">

                        <i data-feather="home"></i>

                        Home

                    </button>

                    <button>

                        <i data-feather="globe"></i>

                        Translate

                    </button>

                    <button>

                        <i data-feather="mic"></i>

                        Voice

                    </button>

                    <button>

                        <i data-feather="clock"></i>

                        History

                    </button>

                    <button>

                        <i data-feather="settings"></i>

                        Settings

                    </button>

                </div>

            </div>

            <!-- UPGRADE -->

            <div class="upgrade-card">

                <h3>
                    Upgrade Pro
                </h3>

                <p>
                    Unlock unlimited translations & AI voice.
                </p>

                <button>
                    Upgrade Now
                </button>

            </div>

        </div>

        <!-- MAIN -->

        <div class="main">

            <!-- HERO -->

            <div class="hero">

                <div class="hero-left">

                    <div class="badge">

                        ✨ AI POWERED

                    </div>

                    <h1>

                        Translate Anything,
                        <span>
                            Anytime.
                        </span>

                    </h1>

                    <p>

                        Break language barriers
                        with advanced AI translation
                        technology.

                    </p>

                    <div class="stats">

                        <div class="stat-box">

                            ⚡ 50+ Languages

                        </div>

                        <div class="stat-box">

                            🎯 99% Accuracy

                        </div>

                        <div class="stat-box">

                            🌐 Instant Translate

                        </div>

                    </div>

                </div>

                <div class="hero-right">

                    <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1200&auto=format&fit=crop"
                        alt="AI">

                </div>

            </div>

            <!-- TRANSLATOR -->

            <div class="translator-grid">

                <!-- INPUT -->

                <div class="card">

                    <div class="card-header">
                        From
                    </div>

                    <select id="sourceLang">

                        <option value="en">
                            🇺🇸 English
                        </option>

                        <option value="hi">
                            🇮🇳 Hindi
                        </option>

                        <option value="fr">
                            🇫🇷 French
                        </option>

                        <option value="es">
                            🇪🇸 Spanish
                        </option>

                    </select>

                    <textarea id="inputText"
                        placeholder="Type your text here..."></textarea>

                    <div class="buttons">

                        <button class="primary-btn"
                            onclick="translateText()">

                            Translate

                        </button>

                        <button onclick="startVoiceInput()">

                            🎤 Speak

                        </button>

                    </div>

                </div>

                <!-- OUTPUT -->

                <div class="card">

                    <div class="card-header">
                        To
                    </div>

                    <select id="targetLang">

                        <option value="hi">
                            🇮🇳 Hindi
                        </option>

                        <option value="en">
                            🇺🇸 English
                        </option>

                        <option value="fr">
                            🇫🇷 French
                        </option>

                        <option value="es">
                            🇪🇸 Spanish
                        </option>

                    </select>

                    <textarea id="outputText"
                        readonly
                        placeholder="Translation will appear here..."></textarea>

                    <div class="buttons">

                        <button id="listenBtn">

                            🔊 Listen

                        </button>

                        <button onclick="copyText()">

                            📋 Copy

                        </button>

                    </div>

                </div>

            </div>

            <!-- HISTORY -->

            <div class="history">

                <div class="history-top">

                    <h2>

                        Recent Translations

                    </h2>

                    <button>

                        View All

                    </button>

                </div>

                <ul id="historyList"></ul>

            </div>

        </div>

    </div>

<script>

    feather.replace();

</script>

<script src="{{ url_for('static',
filename='script.js') }}"></script>

</body>

</html>
